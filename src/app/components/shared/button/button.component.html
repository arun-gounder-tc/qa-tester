<button
  [type]="type()"
  [class]="classes()"
  [disabled]="disabled() || loading()"
  (click)="onClick()"
>
  @if (loading()) {
    <span
      class="inline-block h-3.5 w-3.5 border-2 border-current border-r-transparent rounded-full animate-spin"
      aria-hidden="true"
    ></span>
  }
  <ng-content></ng-content>
</button>
