@if (user(); as u) {
  <div class="relative">
    <button
      type="button"
      class="flex items-center justify-center h-8 w-8 rounded-full overflow-hidden bg-surface-muted text-content-muted text-xs font-semibold border border-border hover:ring-2 hover:ring-border-strong/40 focus-visible:ring-2 focus-visible:ring-content/30 transition-all"
      [attr.aria-expanded]="isOpen()"
      aria-haspopup="menu"
      aria-label="Open user menu"
      (click)="toggle($event)"
    >
      @if (u.avatarUrl && !avatarHasError()) {
        <img
          [src]="u.avatarUrl"
          [alt]="u.login"
          class="h-full w-full object-cover"
          (error)="onAvatarError()"
          referrerpolicy="no-referrer"
        />
      } @else {
        <span>{{ initials() }}</span>
      }
    </button>

    @if (isOpen()) {
      <div
        class="absolute right-0 mt-2 w-64 origin-top-right card shadow-lg overflow-hidden z-50"
        role="menu"
      >
        <div class="px-3 py-3 flex items-center gap-3 border-b border-border">
          <div class="h-9 w-9 rounded-full overflow-hidden bg-surface-muted flex items-center justify-center text-xs font-semibold text-content-muted shrink-0">
            @if (u.avatarUrl && !avatarHasError()) {
              <img
                [src]="u.avatarUrl"
                [alt]="u.login"
                class="h-full w-full object-cover"
                referrerpolicy="no-referrer"
              />
            } @else {
              <span>{{ initials() }}</span>
            }
          </div>
          <div class="min-w-0 flex-1">
            <p class="text-sm font-semibold text-content truncate">{{ u.login }}</p>
            @if (u.name && u.name !== u.login) {
              <p class="text-xs text-content-muted truncate">{{ u.name }}</p>
            }
          </div>
        </div>

        <div class="py-1">
          <button
            type="button"
            class="w-full flex items-center gap-2.5 px-3 py-2 text-sm text-content hover:bg-surface-muted transition-colors text-left"
            role="menuitem"
            (click)="openGithubProfile()"
          >
            <lucide-icon [img]="UserIcon" [size]="15" class="text-content-muted"></lucide-icon>
            <span class="flex-1">View profile on GitHub</span>
            <lucide-icon [img]="ExternalIcon" [size]="12" class="text-content-disabled"></lucide-icon>
          </button>

          <button
            type="button"
            class="w-full flex items-center gap-2.5 px-3 py-2 text-sm text-content hover:bg-surface-muted transition-colors text-left"
            role="menuitem"
            (click)="openSettings()"
          >
            <lucide-icon [img]="SettingsIcon" [size]="15" class="text-content-muted"></lucide-icon>
            <span>Settings</span>
          </button>
        </div>

        <div class="py-1 border-t border-border">
          <button
            type="button"
            class="w-full flex items-center gap-2.5 px-3 py-2 text-sm text-content hover:bg-surface-muted transition-colors text-left"
            role="menuitem"
            (click)="signOut()"
          >
            <lucide-icon [img]="LogOutIcon" [size]="15" class="text-content-muted"></lucide-icon>
            <span>Sign out</span>
          </button>
        </div>
      </div>
    }
  </div>
}
