@if (segments().length > 0) {
  <span class="inline-flex items-center gap-1 text-xs text-content-subtle min-w-0">
    @for (segment of segments(); track $index) {
      @if ($index > 0) {
        <lucide-icon
          [img]="ChevronIcon"
          [size]="10"
          class="text-content-disabled shrink-0"
        ></lucide-icon>
      }
      <span
        class="inline-flex items-center gap-1 truncate"
        [class.text-content-muted]="segment.isLast && emphasizeLast()"
        [class.font-medium]="segment.isLast && emphasizeLast()"
      >
        @if (segment.isHome) {
          <lucide-icon [img]="HomeIcon" [size]="11" class="shrink-0"></lucide-icon>
        } @else {
          {{ segment.label }}
        }
      </span>
    }
  </span>
}
