<div class="relative">
  <button
    type="button"
    class="w-full h-9 px-3 flex items-center justify-between gap-2 bg-surface border border-border rounded text-sm text-content hover:bg-surface-muted disabled:opacity-60 disabled:cursor-not-allowed transition-colors"
    [disabled]="!canToggle()"
    (click)="toggle($event)"
  >
    @if (loading()) {
      <span class="text-content-disabled">{{ loadingMessage() }}</span>
      <span class="inline-block h-3.5 w-3.5 border-2 border-current border-r-transparent rounded-full animate-spin text-content-muted"></span>
    } @else if (errorMessage()) {
      <span class="text-danger truncate">{{ errorMessage() }}</span>
      <lucide-icon [img]="ChevronsIcon" [size]="14" class="text-content-disabled shrink-0"></lucide-icon>
    } @else {
      @if (selectedItem(); as sel) {
        <span class="inline-flex items-center gap-1.5 min-w-0">
          <span class="truncate" [class.font-mono]="mono()">{{ sel.label }}</span>
          @if (sel.protected) {
            <lucide-icon [img]="ShieldIcon" [size]="11" class="text-content-muted shrink-0"></lucide-icon>
          }
        </span>
      } @else {
        <span class="text-content-disabled">{{ placeholder() }}</span>
      }
      <lucide-icon [img]="ChevronsIcon" [size]="14" class="text-content-muted shrink-0"></lucide-icon>
    }
  </button>

  @if (isOpen()) {
    <div class="absolute z-20 top-full left-0 right-0 mt-1 card shadow-md overflow-hidden">
      <div class="relative border-b border-border">
        <lucide-icon
          [img]="SearchIcon"
          [size]="14"
          class="absolute left-3 top-1/2 -translate-y-1/2 text-content-disabled pointer-events-none"
        ></lucide-icon>
        <input
          #searchInput
          type="text"
          class="w-full h-10 pl-9 pr-3 text-sm bg-transparent border-0 text-content placeholder:text-content-disabled focus:outline-none"
          [placeholder]="searchPlaceholder()"
          [value]="query()"
          (input)="onSearchChange($any($event.target).value)"
          (click)="$event.stopPropagation()"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      @if (filteredItems().length === 0) {
        <p class="px-3 py-4 text-sm text-content-muted text-center">
          {{ emptyMessage() }}
        </p>
      } @else {
        <ul class="max-h-56 overflow-y-auto py-1">
          @for (item of filteredItems(); track item.value) {
            <li>
              <button
                type="button"
                class="w-full px-3 py-1.5 flex items-center justify-between gap-2 text-sm hover:bg-surface-muted transition-colors text-left"
                (click)="select(item, $event)"
              >
                <span class="inline-flex items-center gap-1.5 min-w-0">
                  <span
                    class="truncate"
                    [class.font-mono]="mono()"
                    [class.text-content]="!isSelected(item)"
                    [class.font-medium]="isSelected(item)"
                  >
                    {{ item.label }}
                  </span>
                  @if (item.protected) {
                    <lucide-icon
                      [img]="ShieldIcon"
                      [size]="10"
                      class="text-content-muted shrink-0"
                    ></lucide-icon>
                  }
                  @if (item.meta) {
                    <span class="text-xs text-content-subtle truncate">{{ item.meta }}</span>
                  }
                </span>
                @if (isSelected(item)) {
                  <lucide-icon [img]="CheckIcon" [size]="13" class="text-content-muted shrink-0"></lucide-icon>
                }
              </button>
            </li>
          }
        </ul>
      }
    </div>
  }
</div>
