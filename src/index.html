<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>QA Tester</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
  >
  <script>
    // Apply the saved/system theme BEFORE Angular boots so there's no
    // flash of light on the login screen.
    (function () {
      try {
        var stored = localStorage.getItem('qa-tester:theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = stored === 'dark' || ((!stored || stored === 'system') && prefersDark);
        if (dark) document.documentElement.classList.add('dark');
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
